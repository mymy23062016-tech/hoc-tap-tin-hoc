    <!-- Firebase SDKs - Tích hợp đồng bộ Online/Offline -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        let firebaseConfig = null;
        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            }
        } catch (e) {
            console.warn("Đang chạy ở chế độ Offline hoàn toàn.");
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'hanhtrangso-tin8';

        window.syncStats = async function() {
            if (!navigator.onLine || !firebaseConfig) return;
            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                if (!auth.currentUser) {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                }
                if (!auth.currentUser) return;
                let pendingHits = parseInt(localStorage.getItem('htso_pending_sync') || "0");
                const globalDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'statistics', 'global_counter');
                if (pendingHits > 0) {
                    const snap = await getDoc(globalDocRef);
                    if (snap.exists()) {
                        await updateDoc(globalDocRef, { total_access: increment(pendingHits) });
                    } else {
                        await setDoc(globalDocRef, { total_access: pendingHits });
                    }
                    localStorage.setItem('htso_pending_sync', "0");
                }
                onSnapshot(globalDocRef, (doc) => {
                    if (doc.exists()) {
                        document.getElementById('total-global-num').innerText = doc.data().total_access.toLocaleString();
                    }
                });
            } catch (err) {
                console.error("Lỗi đồng bộ Firebase:", err);
            }
        };
        window.addEventListener('online', window.syncStats);
    </script>

                    { q: "Ô F4 có =E4*$F$2. Khi sao chép xuống F5, công thức là:", a: ["=E4*$F$2", "=E5*F2", "=E5*$F$2", "=E5*$F$3"], c: 2 },
                    { q: "Để tính nhanh công thức cho các ô từ E5 đến E9, bạn nên làm gì?", a: ["Gõ lại từng ô", "Sử dụng thao tác sao chép công thức", "Copy giá trị dán xuống", "Tính tay rồi nhập vào"], c: 1 },
                    { q: "Ô B2 có công thức =A1+10. Sao chép sang ô C2, công thức tại C2 là:", a: ["=B1+10", "=A2+10", "=A1+10", "=B2+10"], c: 0 },
                    { q: "Phím nào giúp chuyển địa chỉ tương đối thành tuyệt đối nhanh nhất?", a: ["F2", "F4", "F12", "Alt"], c: 1 },
                    { q: "Giả sử ô D2 có =B2*C2. Sao chép sang ô E3, công thức tại E3 là:", a: ["=B2*C2", "=C3*D3", "=B3*C3", "=D2*B2"], c: 1 },
                    { q: "Nếu dùng địa chỉ tương đối thay vì tuyệt đối cho ô tỉ lệ, ô sao chép sẽ?", a: ["Vẫn đúng", "Bị sai vì lấy sai địa chỉ ô", "Máy tự động sửa lại", "Báo lỗi #VALUE!"], c: 1 },
                    { q: "Ô C1 có công thức =$A$1+B1. Sao chép xuống ô C2, kết quả là:", a: ["=$A$1+B2", "=$A$2+B2", "=$A$1+B1", "=A1+B2"], c: 0 }
                ],
                game: [
                    { name: "C4", gen: "Tương đối", icon: "↗️" },
                    { name: "$C$4", gen: "Tuyệt đối", icon: "🔒" },
                    { name: "B$2", gen: "Hỗn hợp", icon: "⚖️" },
                    { name: "$A10", gen: "Hỗn hợp", icon: "⚖️" },
                    { name: "D7", gen: "Tương đối", icon: "↗️" }
                ]
            }
        };

        /***********************************************************************
         * ⚙️ PHẦN LOGIC XỬ LÝ
         ***********************************************************************/
        let currentId = 1, score = 0, answeredCount = 0, selectedItem = null, activeQuizSet = [];
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'click') {
                osc.frequency.setValueAtTime(800, now); gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(1046, now + 0.2);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'win') {
                [523, 659, 783, 1046].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(f, now + i * 0.1); g.gain.setValueAtTime(0.05, now + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.4);
                    o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.4);
                });
            }
        }

        function initVisitorCounter() {
            let localTotal = parseInt(localStorage.getItem('htso_local_total') || "0") + 1;
            localStorage.setItem('htso_local_total', localTotal);
            document.getElementById('local-visitor-num').innerText = localTotal.toLocaleString();
            let pendingSync = parseInt(localStorage.getItem('htso_pending_sync') || "0") + 1;
            localStorage.setItem('htso_pending_sync', pendingSync);
            if (window.syncStats) window.syncStats();
        }
        window.addEventListener('load', initVisitorCounter);
        document.addEventListener('click', (e) => { if (e.target.closest('button') || e.target.closest('.lesson-card') || e.target.closest('.mode-card')) playSound('click'); });

        function openLesson(id) {
            currentId = id;
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('lesson-detail').style.display = 'block';
            document.getElementById('current-lesson-name').innerText = lessonsData[id]?.name || "Bài học";
            switchTab(0, document.querySelector('.station-btn'));
            window.scrollTo(0, 0);
        }

        function goHome() {
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('lesson-detail').style.display = 'none';
        }

        function switchTab(idx, btn) {
            document.querySelectorAll('.station-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const display = document.getElementById('display-area');
            const data = lessonsData[currentId];
            if(!data) { display.innerHTML = "Đang cập nhật..."; return; }
            display.classList.remove('fade-in'); void display.offsetWidth; display.classList.add('fade-in');
            score = 0; answeredCount = 0; selectedItem = null;
            if(idx === 0) renderTriThuc(data);
            else if(idx === 1) renderGame(data);
            else renderQuiz(data.quiz);
        }

        function renderTriThuc(data) {
            document.getElementById('display-area').innerHTML = `
                <div>
                    <div id="selector" class="mode-selector">
                        <div class="mode-card" onclick="showK('map')"><i>🗺️</i><h4>Sơ đồ tư duy</h4></div>
                        <div class="mode-card" onclick="showK('video')"><i>🎬</i><h4>Video bài giảng AI</h4></div>
                    </div>
                    <div id="k-map" class="knowledge-display">
                        <img src="${data.image}" class="mindmap-img" onerror="this.src='https://placehold.co/800x500/e0e7ff/4361ee?text=Sơ+đồ+đang+cập+nhật'">
                        <div style="margin-top:25px; text-align:left; background:#FFF9F2; padding:25px; border-radius:20px; border-left:5px solid var(--warning);">
                            <h4 style="margin:0 0 15px 0; color:var(--warning);">📌 Kiến thức cốt lõi:</h4>
                            <ul style="padding-left:20px;">${data.summary.map(s => `<li style="margin-bottom:10px;">${s}</li>`).join('')}</ul>
                        </div>
                        <button class="sub-nav-btn" onclick="showK('selector')">← Quay lại</button>
                    </div>
                    <div id="k-video" class="knowledge-display">
                        <div class="video-container"><video id="v" controls src="${data.video}"></video></div>
                        <button class="sub-nav-btn" onclick="showK('selector')">← Quay lại</button>
                    </div>
                </div>`;
            showK('selector');
        }

        function showK(m) {
            document.getElementById('selector').style.display = m==='selector'?'grid':'none';
            document.getElementById('k-map').classList.toggle('active', m==='map');
            document.getElementById('k-video').classList.toggle('active', m==='video');
            const v = document.getElementById('v'); if(v && m!=='video') v.pause();
        }

        function renderQuiz(qs) {
            if (!qs || qs.length === 0) { document.getElementById('display-area').innerHTML = "<h3>Đang chuẩn bị câu hỏi...</h3>"; return; }
            const shuffled = [...qs].sort(() => Math.random() - 0.5);
            activeQuizSet = shuffled.slice(0, 10);
            let h = `<div><h3 style="color:var(--primary); margin-bottom:30px;">🎯 Thử thách trắc nghiệm (Lấy ngẫu nhiên 10 câu)</h3>`;
            activeQuizSet.forEach((it, i) => {
                h += `<div class="quiz-item"><p><b>Câu ${i+1}.</b> ${it.q}</p>`;
                it.a.forEach((ans, j) => { h += `<button class="ans-option" onclick="checkQ(${i}, ${j}, this)">${ans}</button>`; });
                h += `</div>`;
            });
            document.getElementById('display-area').innerHTML = h + `</div>`;
        }

        function checkQ(qi, ai, btn) {
            const correct = activeQuizSet[qi].c;
            const group = btn.parentElement.querySelectorAll('.ans-option');
            if (group[0].disabled) return;
            group.forEach(b => b.disabled = true);
            answeredCount++;
            if(ai === correct) { 
                btn.style.background = "#d1fae5"; btn.style.borderColor="#10b981"; btn.style.color="#064e3b"; 
                score++; playSound('correct'); 
            } else { 
                btn.style.background="#fee2e2"; btn.style.borderColor="#ef4444"; btn.style.color="#7f1d1d";
                group[correct].style.background="#d1fae5"; group[correct].style.borderColor="#10b981";
                playSound('wrong'); 
            }
            if(answeredCount === activeQuizSet.length) setTimeout(() => showFinal(score, answeredCount), 600);
        }

        function renderGame(data) {
            if(!data.game || data.game.length === 0) { document.getElementById('display-area').innerHTML = "<h3>Đang cập nhật trò chơi...</h3>"; return; }
            const items = [...data.game].sort(() => Math.random() - 0.5);
            const gens = [...new Set(data.game.map(i => i.gen))];
            let h = `<div><h3>🕹️ Trạm Thử Thách: Phân loại dữ liệu</h3><div class="game-grid">`;
            items.forEach((it, i) => h += `<div class="game-item" id="gi-${i}" onclick="selG(${i},'${it.gen}','${it.name}','${it.icon}')"><span>${it.icon}</span><b>${it.name}</b></div>`);
            h += `</div><div class="target-grid">`;
            gens.forEach(g => h += `<div class="target-slot" id="ts-${g}" onclick="matchG('${g}')"><b>${g}</b></div>`);
            document.getElementById('display-area').innerHTML = h + `</div></div>`;
        }

        function selG(i,g,n,ic) { document.querySelectorAll('.game-item').forEach(e => e.classList.remove('selected')); selectedItem = {i,g,n,ic}; document.getElementById(`gi-${i}`).classList.add('selected'); }

        function matchG(g) {
            if(!selectedItem) return;
            const slot = document.getElementById(`ts-${g}`);
            if(selectedItem.g === g) {
                document.getElementById(`gi-${selectedItem.i}`).classList.add('matched');
                slot.classList.add('filled'); slot.innerHTML = `<span style="font-size:24px">✅</span><br>${selectedItem.n}`;
                score++; selectedItem = null; playSound('correct');
                if(score === lessonsData[currentId].game.length) setTimeout(() => showFinal(score, score, true), 600);
            } else { playSound('wrong'); alert("Chưa chính xác!"); selectedItem = null; document.querySelectorAll('.game-item').forEach(e => e.classList.remove('selected')); }
        }

        function showFinal(s, t, isG = false) {
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); playSound('win');
            const m = document.getElementById('modal');
            document.getElementById('modal-score').innerText = `Kết quả: ${s}/${t}`;
            const rankCont = document.getElementById('modal-rank-container');
            rankCont.innerHTML = "";
            let r = "", c = "";
            if (s === t) { r = "RẤT XUẤT SẮC"; c = "var(--success)"; }
            else if (s >= t*0.8) { r = "KẾT QUẢ: GIỎI"; c = "#f59e0b"; }
            else if (s >= t*0.5) { r = "BẠN ĐÃ CỐ GẮNG"; c = "var(--warning)"; }
            else { r = "CẦN XEM LẠI BÀI"; c = "var(--error)"; }
            const b = document.createElement('div');
            b.className = 'rank-badge'; b.style.background = c; b.innerText = r;
            rankCont.appendChild(b);
            document.getElementById('modal-title').innerText = isG ? "HOÀN THÀNH!" : "XẾP LOẠI";
            m.style.display = 'flex';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
